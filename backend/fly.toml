# fly.toml app configuration file generated for second-brain-api-damp-coastline-7055 on 2026-06-02T02:15:19+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'second-brain-api-damp-coastline-7055'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  # Keep one machine always warm so requests never hit a cold-start window
  # (during which Fly returns 502s without CORS headers → "CORS error" in the
  # browser and flaky sync). Set back to 0 to save cost when not in use.
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '40s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
