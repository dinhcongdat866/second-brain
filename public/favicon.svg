<svg width="100%" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Second Brain App Icon</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Icon gồm một bộ não màu tím-xanh và cây bút chì vàng chéo góc phải</desc>

  <defs>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C6FF7"/>
      <stop offset="100%" style="stop-color:#5B8DEF"/>
    </linearGradient>
    <linearGradient id="pencilGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5C842"/>
      <stop offset="100%" style="stop-color:#E8A820"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1035"/>
      <stop offset="100%" style="stop-color:#0D1B40"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="40" y="40" width="600" height="600" rx="120" fill="url(#bgGrad)" style="stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Brain shape - left hemisphere -->
  <path d="&#10;    M 260 200&#10;    C 240 190, 200 190, 185 210&#10;    C 165 230, 165 255, 175 270&#10;    C 155 275, 140 295, 145 318&#10;    C 150 340, 170 352, 188 350&#10;    C 182 368, 188 388, 205 396&#10;    C 222 404, 242 398, 252 386&#10;    C 255 398, 265 410, 278 412&#10;    C 295 414, 308 402, 310 388&#10;    L 310 210&#10;    C 295 198, 275 196, 260 200&#10;    Z&#10;  " fill="url(#brainGrad)" opacity="0.95" style="stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.95;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Brain shape - right hemisphere -->
  <path d="&#10;    M 370 200&#10;    C 390 190, 430 190, 445 210&#10;    C 465 230, 465 255, 455 270&#10;    C 475 275, 490 295, 485 318&#10;    C 480 340, 460 352, 442 350&#10;    C 448 368, 442 388, 425 396&#10;    C 408 404, 388 398, 378 386&#10;    C 375 398, 365 410, 352 412&#10;    C 335 414, 322 402, 320 388&#10;    L 320 210&#10;    C 335 198, 355 196, 370 200&#10;    Z&#10;  " fill="url(#brainGrad)" opacity="0.95" style="stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.95;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Center groove -->
  <line x1="315" y1="205" x2="315" y2="405" stroke="#1A1035" stroke-width="10" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(26, 16, 53);color:rgb(0, 0, 0);stroke-width:10px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Brain folds - left -->
  <path d="M 220 240 C 235 230, 255 238, 258 255" fill="none" stroke="#5B8DEF" stroke-width="5" stroke-linecap="round" opacity="0.7" style="fill:none;stroke:rgb(91, 141, 239);color:rgb(0, 0, 0);stroke-width:5px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M 195 290 C 215 278, 240 285, 255 300" fill="none" stroke="#5B8DEF" stroke-width="5" stroke-linecap="round" opacity="0.7" style="fill:none;stroke:rgb(91, 141, 239);color:rgb(0, 0, 0);stroke-width:5px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M 205 340 C 225 330, 248 338, 255 352" fill="none" stroke="#5B8DEF" stroke-width="5" stroke-linecap="round" opacity="0.7" style="fill:none;stroke:rgb(91, 141, 239);color:rgb(0, 0, 0);stroke-width:5px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Brain folds - right -->
  <path d="M 410 240 C 395 230, 375 238, 372 255" fill="none" stroke="#5B8DEF" stroke-width="5" stroke-linecap="round" opacity="0.7" style="fill:none;stroke:rgb(91, 141, 239);color:rgb(0, 0, 0);stroke-width:5px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M 435 290 C 415 278, 390 285, 375 300" fill="none" stroke="#5B8DEF" stroke-width="5" stroke-linecap="round" opacity="0.7" style="fill:none;stroke:rgb(91, 141, 239);color:rgb(0, 0, 0);stroke-width:5px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M 425 340 C 405 330, 382 338, 375 352" fill="none" stroke="#5B8DEF" stroke-width="5" stroke-linecap="round" opacity="0.7" style="fill:none;stroke:rgb(91, 141, 239);color:rgb(0, 0, 0);stroke-width:5px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Pencil - rotated diagonally, bottom right area -->
  <g transform="translate(430, 430) rotate(-40)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <!-- Pencil body -->
    <rect x="-18" y="-120" width="36" height="160" rx="3" fill="url(#pencilGrad)" style="stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Pencil tip (wooden part) -->
    <polygon points="-18,40 18,40 0,80" fill="#D4956A" style="fill:rgb(212, 149, 106);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Pencil graphite tip -->
    <polygon points="-6,72 6,72 0,80" fill="#444" style="fill:rgb(68, 68, 68);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Pencil eraser end -->
    <rect x="-18" y="-130" width="36" height="16" rx="3" fill="#F28B8B" style="fill:rgb(242, 139, 139);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Eraser band -->
    <rect x="-18" y="-118" width="36" height="6" fill="#C0A060" style="fill:rgb(192, 160, 96);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Pencil highlight line -->
    <rect x="-6" y="-120" width="5" height="155" rx="2" fill="#FDEAA0" opacity="0.5" style="fill:rgb(253, 234, 160);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>

  <!-- Small sparkle dots near brain for "knowledge" feel -->
  <circle cx="170" cy="180" r="5" fill="#7C6FF7" opacity="0.6" style="fill:rgb(124, 111, 247);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="155" cy="200" r="3" fill="#5B8DEF" opacity="0.5" style="fill:rgb(91, 141, 239);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="178" cy="162" r="3" fill="#A89CF7" opacity="0.4" style="fill:rgb(168, 156, 247);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <circle cx="510" cy="180" r="5" fill="#7C6FF7" opacity="0.6" style="fill:rgb(124, 111, 247);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="525" cy="200" r="3" fill="#5B8DEF" opacity="0.5" style="fill:rgb(91, 141, 239);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="505" cy="162" r="3" fill="#A89CF7" opacity="0.4" style="fill:rgb(168, 156, 247);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</svg>